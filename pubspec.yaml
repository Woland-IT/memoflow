name: memoflow
description: "MemoFlow – Osobisty asystent notatek, terminarza i list zakupów"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  intl: ^0.19.0
  table_calendar: ^3.1.2
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  supabase_flutter: ^2.5.0   # najnowsza stabilna
  drift: ^2.20.0             # lokalna baza (opcjonalnie)
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - .env